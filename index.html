<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Video AI - ショート動画ジェネレーター</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out;
    }
    select option {
      background: #1a1a1a;
      color: white;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Lucide Icons as components
    const Icon = ({ name, className }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          lucide.createElement(lucide.icons[name]).forEach(el => {
            if (el instanceof Node) ref.current.appendChild(el);
          });
        }
      }, [name]);
      return <span ref={ref} className={`inline-flex ${className || ''}`} style={{width: '1em', height: '1em'}} />;
    };

    const ASPECT_RATIOS = {
      'instagram-reels': { width: 1080, height: 1920, label: 'Reels', ratio: '9:16' },
      'youtube-shorts': { width: 1080, height: 1920, label: 'Shorts', ratio: '9:16' },
      'tiktok': { width: 1080, height: 1920, label: 'TikTok', ratio: '9:16' },
      'instagram-square': { width: 1080, height: 1080, label: 'Square', ratio: '1:1' },
    };

    const STYLE_PRESETS = [
      { id: 'cinematic', name: 'シネマティック', icon: '🎬', description: 'ダイナミック' },
      { id: 'minimal', name: 'ミニマル', icon: '◻️', description: 'シンプル' },
      { id: 'energetic', name: 'エネルギッシュ', icon: '⚡', description: '高速カット' },
      { id: 'storytelling', name: 'ストーリー', icon: '📖', description: 'ナレーション' },
      { id: 'aesthetic', name: 'エステティック', icon: '✨', description: 'トレンド' },
      { id: 'promotional', name: 'プロモ', icon: '🎯', description: '訴求型' },
    ];

    function ShortVideoGenerator() {
      const [step, setStep] = useState(1);
      const [mediaFiles, setMediaFiles] = useState([]);
      const [concept, setConcept] = useState('');
      const [platform, setPlatform] = useState('instagram-reels');
      const [stylePreset, setStylePreset] = useState('cinematic');
      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedScenario, setGeneratedScenario] = useState(null);
      const [scenes, setScenes] = useState([]);
      const [currentSceneIndex, setCurrentSceneIndex] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [expandedScene, setExpandedScene] = useState(null);
      const [showPreview, setShowPreview] = useState(true);
      const fileInputRef = useRef(null);

      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        const newFiles = files.map((file, idx) => ({
          id: `media-${Date.now()}-${idx}`,
          file,
          type: file.type.startsWith('video') ? 'video' : 'image',
          url: URL.createObjectURL(file),
          name: file.name,
          duration: file.type.startsWith('video') ? null : 3,
        }));
        setMediaFiles(prev => [...prev, ...newFiles]);
      };

      const removeMedia = (id) => {
        setMediaFiles(prev => prev.filter(m => m.id !== id));
      };

      const generateScenario = async () => {
        setIsGenerating(true);
        
        const styleInfo = STYLE_PRESETS.find(s => s.id === stylePreset);
        
        // シミュレーション（実際のAPIは使用しない）
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        const fallbackScenes = mediaFiles.map((media, i) => ({
          id: `scene-${i}`,
          sceneNumber: i + 1,
          mediaIndex: i,
          media,
          duration: 3,
          text: i === 0 ? '✨ ' + (concept.slice(0, 15) || 'タイトル') : '',
          textPosition: 'center',
          transition: ['fade', 'slide', 'zoom'][i % 3],
          effect: ['zoom-in', 'zoom-out', 'none'][i % 3],
          description: `シーン ${i + 1}: ${styleInfo.name}スタイル`,
        }));
        
        setScenes(fallbackScenes);
        setGeneratedScenario({
          title: concept || '新規動画',
          totalDuration: fallbackScenes.length * 3,
          hook: '最初の3秒で視聴者の心を掴む',
          callToAction: 'フォロー&いいねお願いします！',
          musicSuggestion: `${styleInfo.name}に合うトレンディなBGM`,
        });
        setStep(3);
        setIsGenerating(false);
      };

      const updateScene = (sceneId, updates) => {
        setScenes(prev => prev.map(s => 
          s.id === sceneId ? { ...s, ...updates } : s
        ));
      };

      const moveScene = (index, direction) => {
        const newIndex = index + direction;
        if (newIndex < 0 || newIndex >= scenes.length) return;
        
        const newScenes = [...scenes];
        const temp = newScenes[index];
        newScenes[index] = newScenes[newIndex];
        newScenes[newIndex] = temp;
        setScenes(newScenes);
        setCurrentSceneIndex(newIndex);
      };

      const deleteScene = (index) => {
        setScenes(prev => prev.filter((_, i) => i !== index));
        if (currentSceneIndex >= scenes.length - 1) {
          setCurrentSceneIndex(Math.max(0, scenes.length - 2));
        }
        setExpandedScene(null);
      };

      const addScene = () => {
        if (mediaFiles.length === 0) return;
        const newScene = {
          id: `scene-${Date.now()}`,
          sceneNumber: scenes.length + 1,
          mediaIndex: 0,
          media: mediaFiles[0],
          duration: 3,
          text: '',
          textPosition: 'center',
          transition: 'fade',
          effect: 'none',
          description: '新規シーン',
        };
        setScenes([...scenes, newScene]);
      };

      const totalDuration = scenes.reduce((sum, s) => sum + (s.duration || 3), 0);

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-950 via-amber-900 to-orange-950 text-white font-sans overflow-x-hidden">
          {/* Background gradient */}
          <div className="fixed inset-0 bg-gradient-to-br from-orange-900/50 via-transparent to-amber-950/40 pointer-events-none" />
          <div className="fixed top-0 right-0 w-[300px] md:w-[600px] h-[300px] md:h-[600px] bg-orange-800/20 rounded-full blur-[80px] md:blur-[120px] pointer-events-none" />
          <div className="fixed bottom-0 left-0 w-[200px] md:w-[400px] h-[200px] md:h-[400px] bg-red-900/20 rounded-full blur-[60px] md:blur-[100px] pointer-events-none" />
          
          <div className="relative z-10 max-w-7xl mx-auto px-4 md:px-6 py-4 md:py-8">
            {/* Header */}
            <header className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6 md:mb-12">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl bg-gradient-to-br from-orange-600 to-red-700 flex items-center justify-center shadow-lg shadow-black/30">
                  <svg className="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-xl md:text-2xl font-bold tracking-tight">Short Video AI</h1>
                  <p className="text-xs md:text-sm text-white/80">ショート動画ジェネレーター</p>
                </div>
              </div>
              
              {/* Progress Steps */}
              <div className="flex items-center gap-1 md:gap-2 w-full sm:w-auto overflow-x-auto pb-2 sm:pb-0">
                {[
                  { num: 1, label: '素材' },
                  { num: 2, label: 'コンセプト' },
                  { num: 3, label: '編集' },
                ].map((s, i) => (
                  <React.Fragment key={s.num}>
                    <button
                      onClick={() => s.num < step && setStep(s.num)}
                      className={`flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-1.5 md:py-2 rounded-full transition-all whitespace-nowrap ${
                        step === s.num 
                          ? 'bg-white/10 text-white' 
                          : step > s.num 
                            ? 'text-white/80 hover:text-white cursor-pointer' 
                            : 'text-white/60 cursor-not-allowed'
                      }`}
                    >
                      <span className={`w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center text-xs md:text-sm font-medium ${
                        step >= s.num ? 'bg-orange-500' : 'bg-white/20'
                      }`}>
                        {s.num}
                      </span>
                      <span className="text-xs md:text-sm font-medium">{s.label}</span>
                    </button>
                    {i < 2 && (
                      <svg className="w-3 h-3 md:w-4 md:h-4 text-white/40 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                      </svg>
                    )}
                  </React.Fragment>
                ))}
              </div>
            </header>

            {/* Step 1: Media Upload */}
            {step === 1 && (
              <div className="animate-fadeIn">
                <div className="text-center mb-6 md:mb-10">
                  <h2 className="text-2xl md:text-4xl font-bold mb-2 md:mb-3 bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                    素材をアップロード
                  </h2>
                  <p className="text-white/80 text-sm md:text-lg">動画や画像を選択</p>
                </div>

                <div 
                  onClick={() => fileInputRef.current?.click()}
                  className="relative border-2 border-dashed border-white/40 rounded-2xl md:rounded-3xl p-8 md:p-16 text-center cursor-pointer hover:border-orange-400 hover:bg-white/10 transition-all group active:scale-[0.98]"
                >
                  <input
                    ref={fileInputRef}
                    type="file"
                    accept="image/*,video/*"
                    multiple
                    onChange={handleFileUpload}
                    className="hidden"
                  />
                  <div className="w-14 h-14 md:w-20 md:h-20 mx-auto mb-4 md:mb-6 rounded-xl md:rounded-2xl bg-gradient-to-br from-orange-700/40 to-red-600/40 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg className="w-7 h-7 md:w-10 md:h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                  </div>
                  <p className="text-base md:text-xl font-medium mb-1 md:mb-2">タップしてファイルを選択</p>
                  <p className="text-white/70 text-sm md:text-base">JPG, PNG, MP4, MOV</p>
                </div>

                {/* Uploaded Media Grid */}
                {mediaFiles.length > 0 && (
                  <div className="mt-6 md:mt-8">
                    <div className="flex items-center justify-between mb-3 md:mb-4">
                      <h3 className="text-base md:text-lg font-medium">アップロード済み ({mediaFiles.length})</h3>
                      <button
                        onClick={() => setMediaFiles([])}
                        className="text-xs md:text-sm text-white/70 hover:text-white transition-colors"
                      >
                        クリア
                      </button>
                    </div>
                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-2 md:gap-4">
                      {mediaFiles.map((media) => (
                        <div 
                          key={media.id} 
                          className="relative group aspect-[9/16] rounded-lg md:rounded-xl overflow-hidden bg-white/5"
                        >
                          {media.type === 'video' ? (
                            <video src={media.url} className="w-full h-full object-cover" />
                          ) : (
                            <img src={media.url} alt={media.name} className="w-full h-full object-cover" />
                          )}
                          <button
                            onClick={(e) => { e.stopPropagation(); removeMedia(media.id); }}
                            className="absolute top-1 right-1 w-6 h-6 md:w-8 md:h-8 rounded-full bg-black/60 flex items-center justify-center text-white/80 hover:bg-red-500 transition-colors"
                          >
                            <svg className="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                            </svg>
                          </button>
                          <div className="absolute bottom-1 left-1 right-1">
                            <span className="px-1.5 py-0.5 rounded bg-black/60 text-[10px] md:text-xs truncate block">
                              {media.type === 'video' ? '🎬' : '🖼️'}
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="flex justify-end mt-6 md:mt-8">
                  <button
                    onClick={() => setStep(2)}
                    disabled={mediaFiles.length === 0}
                    className={`flex items-center gap-2 px-6 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-medium transition-all text-sm md:text-base ${
                      mediaFiles.length > 0
                        ? 'bg-gradient-to-r from-orange-500 to-red-500 hover:opacity-90 shadow-lg shadow-black/30 active:scale-[0.98]'
                        : 'bg-white/20 text-white/60 cursor-not-allowed'
                    }`}
                  >
                    次へ
                    <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                    </svg>
                  </button>
                </div>
              </div>
            )}

            {/* Step 2: Concept & Style */}
            {step === 2 && (
              <div className="animate-fadeIn max-w-4xl mx-auto">
                <div className="text-center mb-6 md:mb-10">
                  <h2 className="text-2xl md:text-4xl font-bold mb-2 md:mb-3 bg-gradient-to-r from-white to-white/60 bg-clip-text text-transparent">
                    コンセプトを設定
                  </h2>
                  <p className="text-white/80 text-sm md:text-lg">AIがシナリオを生成</p>
                </div>

                {/* Platform Selection */}
                <div className="mb-6 md:mb-8">
                  <label className="block text-sm font-medium text-white/90 mb-2 md:mb-3">プラットフォーム</label>
                  <div className="grid grid-cols-4 gap-2 md:gap-3">
                    {Object.entries(ASPECT_RATIOS).map(([key, value]) => (
                      <button
                        key={key}
                        onClick={() => setPlatform(key)}
                        className={`p-2 md:p-4 rounded-lg md:rounded-xl border-2 transition-all active:scale-[0.98] ${
                          platform === key
                            ? 'border-orange-400 bg-orange-500/30'
                            : 'border-white/30 hover:border-white/50 bg-white/10'
                        }`}
                      >
                        <div className="text-lg md:text-2xl mb-1 md:mb-2">
                          {key.includes('instagram') ? '📸' : key === 'youtube-shorts' ? '▶️' : '🎵'}
                        </div>
                        <div className="text-xs md:text-sm font-medium">{value.label}</div>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Style Presets */}
                <div className="mb-6 md:mb-8">
                  <label className="block text-sm font-medium text-white/90 mb-2 md:mb-3">スタイル</label>
                  <div className="grid grid-cols-3 md:grid-cols-6 gap-2 md:gap-3">
                    {STYLE_PRESETS.map((style) => (
                      <button
                        key={style.id}
                        onClick={() => setStylePreset(style.id)}
                        className={`p-2 md:p-3 rounded-lg md:rounded-xl border-2 text-center transition-all active:scale-[0.98] ${
                          stylePreset === style.id
                            ? 'border-orange-400 bg-orange-500/30'
                            : 'border-white/30 hover:border-white/50 bg-white/10'
                        }`}
                      >
                        <div className="text-lg md:text-xl mb-0.5 md:mb-1">{style.icon}</div>
                        <div className="text-[10px] md:text-xs font-medium">{style.name}</div>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Concept Input */}
                <div className="mb-6 md:mb-8">
                  <label className="block text-sm font-medium text-white/90 mb-2 md:mb-3">
                    コンセプト
                  </label>
                  <textarea
                    value={concept}
                    onChange={(e) => setConcept(e.target.value)}
                    placeholder="例: 新商品のカフェラテを紹介。おしゃれなカフェの雰囲気で..."
                    className="w-full h-28 md:h-40 px-4 md:px-5 py-3 md:py-4 rounded-xl md:rounded-2xl bg-white/10 border-2 border-white/30 focus:border-orange-400 focus:outline-none resize-none placeholder-white/50 transition-colors text-sm md:text-base"
                  />
                </div>

                {/* Uploaded Media Preview */}
                <div className="mb-6 md:mb-8 p-3 md:p-4 rounded-xl md:rounded-2xl bg-white/10 border border-white/30">
                  <div className="flex items-center gap-2 mb-2 md:mb-3">
                    <svg className="w-4 h-4 text-orange-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <span className="text-xs md:text-sm font-medium">素材 ({mediaFiles.length})</span>
                  </div>
                  <div className="flex gap-2 overflow-x-auto pb-2">
                    {mediaFiles.map((media) => (
                      <div key={media.id} className="flex-shrink-0 w-12 h-20 md:w-16 md:h-28 rounded-lg overflow-hidden bg-white/5">
                        {media.type === 'video' ? (
                          <video src={media.url} className="w-full h-full object-cover" />
                        ) : (
                          <img src={media.url} alt={media.name} className="w-full h-full object-cover" />
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="flex justify-between gap-3">
                  <button
                    onClick={() => setStep(1)}
                    className="flex items-center gap-1 md:gap-2 px-4 md:px-6 py-3 md:py-4 rounded-xl md:rounded-2xl font-medium text-white/80 hover:text-white transition-colors text-sm md:text-base"
                  >
                    <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                    </svg>
                    戻る
                  </button>
                  <button
                    onClick={generateScenario}
                    disabled={!concept.trim() || isGenerating}
                    className={`flex items-center gap-2 md:gap-3 px-5 md:px-8 py-3 md:py-4 rounded-xl md:rounded-2xl font-medium transition-all text-sm md:text-base ${
                      concept.trim() && !isGenerating
                        ? 'bg-gradient-to-r from-orange-500 to-red-500 hover:opacity-90 shadow-lg shadow-black/30 active:scale-[0.98]'
                        : 'bg-white/20 text-white/60 cursor-not-allowed'
                    }`}
                  >
                    {isGenerating ? (
                      <>
                        <div className="w-4 h-4 md:w-5 md:h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                        <span className="hidden sm:inline">生成中...</span>
                      </>
                    ) : (
                      <>
                        <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                        </svg>
                        <span>AIで生成</span>
                        <span>✨</span>
                      </>
                    )}
                  </button>
                </div>
              </div>
            )}

            {/* Step 3: Edit & Preview */}
            {step === 3 && generatedScenario && (
              <div className="animate-fadeIn">
                {/* Mobile: Toggle Preview */}
                <div className="lg:hidden mb-4">
                  <button
                    onClick={() => setShowPreview(!showPreview)}
                    className="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white/10 border border-white/30"
                  >
                    <span className="font-medium">プレビュー</span>
                    <svg className={`w-5 h-5 transition-transform ${showPreview ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                    </svg>
                  </button>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-8">
                  {/* Preview Panel */}
                  <div className={`lg:col-span-1 ${showPreview ? 'block' : 'hidden lg:block'}`}>
                    <div className="lg:sticky lg:top-8">
                      <div className="bg-white/10 rounded-2xl md:rounded-3xl p-4 md:p-6 border border-white/30">
                        <div className="flex items-center justify-between mb-3 md:mb-4">
                          <h3 className="font-medium text-sm md:text-base">プレビュー</h3>
                          <span className="text-xs md:text-sm text-white/80">
                            <svg className="w-3 h-3 md:w-4 md:h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            {totalDuration}秒
                          </span>
                        </div>
                        
                        {/* Phone Frame */}
                        <div className="relative mx-auto w-full max-w-[180px] md:max-w-[240px] aspect-[9/16] rounded-[1.5rem] md:rounded-[2rem] bg-black border-4 border-white/20 overflow-hidden shadow-2xl">
                          <div className="absolute top-2 md:top-3 left-1/2 -translate-x-1/2 w-16 md:w-20 h-5 md:h-6 bg-black rounded-full z-20" />
                          
                          {scenes[currentSceneIndex] && (
                            <div className="absolute inset-0">
                              {scenes[currentSceneIndex].media?.type === 'video' ? (
                                <video 
                                  src={scenes[currentSceneIndex].media.url} 
                                  className="w-full h-full object-cover"
                                  autoPlay={isPlaying}
                                  muted
                                  loop
                                />
                              ) : (
                                <img 
                                  src={scenes[currentSceneIndex].media?.url} 
                                  alt="" 
                                  className={`w-full h-full object-cover transition-transform duration-1000 ${
                                    scenes[currentSceneIndex].effect === 'zoom-in' ? 'scale-110' : ''
                                  }`}
                                />
                              )}
                              
                              {scenes[currentSceneIndex].text && (
                                <div className={`absolute inset-x-2 md:inset-x-4 flex items-center justify-center ${
                                  scenes[currentSceneIndex].textPosition === 'top' ? 'top-12 md:top-16' :
                                  scenes[currentSceneIndex].textPosition === 'bottom' ? 'bottom-12 md:bottom-16' : 'top-1/2 -translate-y-1/2'
                                }`}>
                                  <p className="text-white text-center text-sm md:text-lg font-bold drop-shadow-lg px-2 md:px-4 py-1 md:py-2 bg-black/30 rounded-lg md:rounded-xl backdrop-blur-sm">
                                    {scenes[currentSceneIndex].text}
                                  </p>
                                </div>
                              )}
                              
                              <div className="absolute top-8 md:top-10 left-2 md:left-3 right-2 md:right-3 flex gap-0.5 md:gap-1">
                                {scenes.map((_, i) => (
                                  <div 
                                    key={i}
                                    className={`h-0.5 md:h-1 flex-1 rounded-full transition-colors ${
                                      i === currentSceneIndex ? 'bg-white' : 'bg-white/30'
                                    }`}
                                  />
                                ))}
                              </div>
                            </div>
                          )}
                        </div>

                        {/* Playback Controls */}
                        <div className="flex items-center justify-center gap-3 md:gap-4 mt-4 md:mt-6">
                          <button
                            onClick={() => setCurrentSceneIndex(Math.max(0, currentSceneIndex - 1))}
                            disabled={currentSceneIndex === 0}
                            className="p-2 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-30 disabled:cursor-not-allowed transition-colors active:scale-95"
                          >
                            <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                            </svg>
                          </button>
                          <button
                            onClick={() => setIsPlaying(!isPlaying)}
                            className="w-12 h-12 md:w-14 md:h-14 rounded-full bg-gradient-to-r from-orange-500 to-red-500 flex items-center justify-center shadow-lg shadow-black/30 active:scale-95"
                          >
                            {isPlaying ? (
                              <svg className="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                              </svg>
                            ) : (
                              <svg className="w-5 h-5 md:w-6 md:h-6 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                              </svg>
                            )}
                          </button>
                          <button
                            onClick={() => setCurrentSceneIndex(Math.min(scenes.length - 1, currentSceneIndex + 1))}
                            disabled={currentSceneIndex === scenes.length - 1}
                            className="p-2 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-30 disabled:cursor-not-allowed transition-colors active:scale-95"
                          >
                            <svg className="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                            </svg>
                          </button>
                        </div>

                        <p className="text-center text-xs md:text-sm text-white/80 mt-2 md:mt-3">
                          シーン {currentSceneIndex + 1} / {scenes.length}
                        </p>
                      </div>

                      {/* AI Suggestions */}
                      <div className="hidden lg:block mt-4 md:mt-6 p-4 md:p-5 rounded-xl md:rounded-2xl bg-gradient-to-br from-orange-600/30 to-red-700/30 border border-orange-400/40">
                        <div className="flex items-center gap-2 mb-2 md:mb-3">
                          <span>✨</span>
                          <span className="text-xs md:text-sm font-medium">AIからの提案</span>
                        </div>
                        <div className="space-y-1.5 md:space-y-2 text-xs md:text-sm text-white/90">
                          <p>🎬 {generatedScenario.hook}</p>
                          <p>🎯 {generatedScenario.callToAction}</p>
                          <p>🎵 {generatedScenario.musicSuggestion}</p>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Timeline & Scene Editor */}
                  <div className="lg:col-span-2 space-y-4 md:space-y-6">
                    <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                      <h3 className="text-lg md:text-xl font-bold truncate">{generatedScenario.title}</h3>
                      <div className="flex gap-2 md:gap-3 w-full sm:w-auto">
                        <button
                          onClick={() => setStep(2)}
                          className="flex-1 sm:flex-none flex items-center justify-center gap-1.5 md:gap-2 px-3 md:px-4 py-2 rounded-lg md:rounded-xl bg-white/20 hover:bg-white/30 transition-colors text-xs md:text-sm active:scale-95"
                        >
                          <svg className="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                          </svg>
                          再生成
                        </button>
                        <button className="flex-1 sm:flex-none flex items-center justify-center gap-1.5 md:gap-2 px-4 md:px-6 py-2 rounded-lg md:rounded-xl bg-gradient-to-r from-orange-500 to-red-500 font-medium shadow-lg shadow-black/30 text-xs md:text-sm active:scale-95">
                          <svg className="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                          </svg>
                          書き出し
                        </button>
                      </div>
                    </div>

                    {/* Scene List */}
                    <div className="space-y-2 md:space-y-3">
                      {scenes.map((scene, index) => (
                        <div
                          key={scene.id}
                          onClick={() => {
                            setCurrentSceneIndex(index);
                            setExpandedScene(expandedScene === index ? null : index);
                          }}
                          className={`rounded-xl md:rounded-2xl border-2 transition-all cursor-pointer overflow-hidden ${
                            currentSceneIndex === index
                              ? 'border-orange-400 bg-orange-500/30'
                              : 'border-white/30 bg-white/10'
                          }`}
                        >
                          {/* Scene Header */}
                          <div className="flex items-center gap-2 md:gap-4 p-3 md:p-4">
                            {/* Thumbnail */}
                            <div className="w-12 h-20 md:w-16 md:h-24 rounded-lg overflow-hidden bg-white/5 flex-shrink-0">
                              {scene.media?.type === 'video' ? (
                                <video src={scene.media.url} className="w-full h-full object-cover" />
                              ) : (
                                <img src={scene.media?.url} alt="" className="w-full h-full object-cover" />
                              )}
                            </div>

                            {/* Scene Info */}
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center justify-between mb-1">
                                <span className="text-xs md:text-sm font-medium">シーン {index + 1}</span>
                                <span className="text-xs text-white/70">{scene.duration}秒</span>
                              </div>
                              <p className="text-xs md:text-sm text-white/80 truncate">{scene.description}</p>
                              {scene.text && (
                                <p className="text-xs text-orange-300 truncate mt-1">"{scene.text}"</p>
                              )}
                            </div>

                            {/* Expand/Collapse */}
                            <svg className={`w-4 h-4 md:w-5 md:h-5 text-white/60 transition-transform ${expandedScene === index ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                            </svg>
                          </div>

                          {/* Expanded Content */}
                          {expandedScene === index && (
                            <div className="px-3 md:px-4 pb-3 md:pb-4 space-y-3 md:space-y-4 border-t border-white/20 pt-3 md:pt-4" onClick={(e) => e.stopPropagation()}>
                              {/* Quick Actions */}
                              <div className="flex gap-2">
                                <button
                                  onClick={() => moveScene(index, -1)}
                                  disabled={index === 0}
                                  className="flex-1 flex items-center justify-center gap-1 py-2 rounded-lg bg-white/10 disabled:opacity-30 text-xs active:scale-95"
                                >
                                  ↑ 上へ
                                </button>
                                <button
                                  onClick={() => moveScene(index, 1)}
                                  disabled={index === scenes.length - 1}
                                  className="flex-1 flex items-center justify-center gap-1 py-2 rounded-lg bg-white/10 disabled:opacity-30 text-xs active:scale-95"
                                >
                                  ↓ 下へ
                                </button>
                                <button
                                  onClick={() => deleteScene(index)}
                                  className="flex-1 flex items-center justify-center gap-1 py-2 rounded-lg bg-red-500/20 text-red-300 text-xs active:scale-95"
                                >
                                  🗑 削除
                                </button>
                              </div>

                              {/* Duration & Effects */}
                              <div className="grid grid-cols-3 gap-2 md:gap-3">
                                <div>
                                  <label className="block text-[10px] md:text-xs text-white/70 mb-1">時間</label>
                                  <div className="flex items-center gap-1">
                                    <input
                                      type="number"
                                      value={scene.duration}
                                      onChange={(e) => updateScene(scene.id, { duration: parseInt(e.target.value) || 1 })}
                                      min="1"
                                      max="15"
                                      className="w-full px-2 py-1.5 rounded-lg bg-white/10 border border-white/30 text-xs md:text-sm focus:border-orange-400 focus:outline-none"
                                    />
                                    <span className="text-[10px] md:text-xs text-white/70">秒</span>
                                  </div>
                                </div>

                                <div>
                                  <label className="block text-[10px] md:text-xs text-white/70 mb-1">切替</label>
                                  <select
                                    value={scene.transition}
                                    onChange={(e) => updateScene(scene.id, { transition: e.target.value })}
                                    className="w-full px-2 py-1.5 rounded-lg bg-white/10 border border-white/30 text-xs md:text-sm focus:border-orange-400 focus:outline-none"
                                  >
                                    <option value="none">なし</option>
                                    <option value="fade">フェード</option>
                                    <option value="slide">スライド</option>
                                    <option value="zoom">ズーム</option>
                                  </select>
                                </div>

                                <div>
                                  <label className="block text-[10px] md:text-xs text-white/70 mb-1">効果</label>
                                  <select
                                    value={scene.effect}
                                    onChange={(e) => updateScene(scene.id, { effect: e.target.value })}
                                    className="w-full px-2 py-1.5 rounded-lg bg-white/10 border border-white/30 text-xs md:text-sm focus:border-orange-400 focus:outline-none"
                                  >
                                    <option value="none">なし</option>
                                    <option value="zoom-in">拡大</option>
                                    <option value="zoom-out">縮小</option>
                                    <option value="pan-left">パン左</option>
                                    <option value="pan-right">パン右</option>
                                  </select>
                                </div>
                              </div>

                              {/* Text Overlay */}
                              <div>
                                <label className="block text-[10px] md:text-xs text-white/70 mb-1">テキスト</label>
                                <div className="flex gap-2">
                                  <input
                                    type="text"
                                    value={scene.text}
                                    onChange={(e) => updateScene(scene.id, { text: e.target.value })}
                                    placeholder="表示テキスト"
                                    className="flex-1 px-3 py-1.5 rounded-lg bg-white/10 border border-white/30 text-xs md:text-sm focus:border-orange-400 focus:outline-none placeholder-white/40"
                                  />
                                  <select
                                    value={scene.textPosition}
                                    onChange={(e) => updateScene(scene.id, { textPosition: e.target.value })}
                                    className="px-2 py-1.5 rounded-lg bg-white/10 border border-white/30 text-xs md:text-sm focus:border-orange-400 focus:outline-none"
                                  >
                                    <option value="top">上</option>
                                    <option value="center">中</option>
                                    <option value="bottom">下</option>
                                  </select>
                                </div>
                              </div>

                              {/* Media Selector */}
                              <div>
                                <label className="block text-[10px] md:text-xs text-white/70 mb-1">素材</label>
                                <div className="flex gap-1.5 md:gap-2 overflow-x-auto pb-1">
                                  {mediaFiles.map((media, mIdx) => (
                                    <button
                                      key={media.id}
                                      onClick={() => updateScene(scene.id, { media, mediaIndex: mIdx })}
                                      className={`flex-shrink-0 w-10 h-16 md:w-12 md:h-20 rounded-lg overflow-hidden border-2 transition-all ${
                                        scene.mediaIndex === mIdx ? 'border-orange-400' : 'border-transparent'
                                      }`}
                                    >
                                      {media.type === 'video' ? (
                                        <video src={media.url} className="w-full h-full object-cover" />
                                      ) : (
                                        <img src={media.url} alt="" className="w-full h-full object-cover" />
                                      )}
                                    </button>
                                  ))}
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      ))}

                      {/* Add Scene Button */}
                      <button
                        onClick={addScene}
                        className="w-full p-3 md:p-4 rounded-xl md:rounded-2xl border-2 border-dashed border-white/40 hover:border-orange-400 hover:bg-white/10 transition-all flex items-center justify-center gap-2 text-white/80 hover:text-white text-sm active:scale-[0.98]"
                      >
                        <span>＋</span>
                        シーンを追加
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShortVideoGenerator />);
  </script>
</body>
</html>
